<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片展示</title>
    <style>
        /* 重置基本樣式 */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6; /* 淺灰色背景，讓照片更突出 */
            font-family: sans-serif;
        }

        /* 圖片容器：設定為彈性盒子(Flexbox)並垂直排列 */
        .gallery-container {
            display: flex;
            flex-direction: column; /* 垂直排列 */
            align-items: center;    /* 水平置中 */
            gap: 2rem;              /* 照片之間的間距 */
            padding: 2rem;          /* 容器四周的內邊距 */
            max-width: 800px;       /* 限制最大寬度，避免在大螢幕上照片過大 */
            margin: 0 auto;         /* 讓整個容器在頁面中置中 */
        }

        /* 圖片樣式：響應式設計與美化 */
        .gallery-image {
            width: 100%;            /* 寬度佔滿容器 */
            height: auto;           /* 高度自動按比例縮放 */
            border-radius: 12px;    /* 圓角邊框 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* 增加陰影提升立體感 */
            display: block;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <!-- 依序插入你上傳的三張照片 -->
        <img src="照片1.jpeg" alt="照片 1 - 家庭野餐" class="gallery-image">
        <img src="照片2.jpeg" alt="照片 2 - 朋友聚餐" class="gallery-image">
        <img src="照片3.jpeg" alt="照片 3 - 街景夜拍" class="gallery-image">
    </div>

</body>
</html>
